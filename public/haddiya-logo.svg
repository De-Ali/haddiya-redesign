<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Gift box bottom -->
  <rect x="25" y="110" width="150" height="90" rx="12" fill="#7A1E2B"/>
  <!-- Gift box right panel -->
  <rect x="95" y="110" width="80" height="90" rx="0" fill="#D4B896" opacity="0.85"/>
  <rect x="160" y="110" width="15" height="90" rx="12" fill="#D4B896" opacity="0.85"/>
  <!-- Gift box lid -->
  <rect x="15" y="90" width="170" height="30" rx="8" fill="#7A1E2B"/>
  <!-- Vertical ribbon -->
  <rect x="88" y="90" width="20" height="110" fill="#7A1E2B" opacity="0.9"/>
  <!-- Bow loops -->
  <ellipse cx="98" cy="75" rx="38" ry="28" fill="#7A1E2B"/>
  <ellipse cx="98" cy="75" rx="28" ry="20" fill="#8B2E3B"/>
  <!-- Bow left loop -->
  <path d="M98 60 Q55 30 60 65 Q62 85 98 80Z" fill="#7A1E2B"/>
  <!-- Bow right loop -->
  <path d="M98 60 Q141 30 136 65 Q134 85 98 80Z" fill="#7A1E2B"/>
  <!-- Bow center knot -->
  <ellipse cx="98" cy="72" rx="12" ry="10" fill="#9A3344"/>
  <!-- Bow ribbon tails -->
  <path d="M65 58 Q58 40 50 52" stroke="#7A1E2B" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M131 58 Q138 40 146 52" stroke="#7A1E2B" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Smile curve at bottom -->
  <path d="M40 210 Q100 230 160 210" stroke="#D4AF37" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
